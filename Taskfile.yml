version: '3'

tasks:
  run:
    desc: Run the Flow CLI via Go.
    cmds:
      - go run .

  publish:
    desc: Build and install the Flow CLI binary to ~/bin/f.
    cmds:
      - |
        set -euo pipefail
        bin_dir="$HOME/bin"
        target="$bin_dir/f"
        mkdir -p "$bin_dir"
        export GOCACHE="${GOCACHE:-$PWD/.gocache}"
        mkdir -p "$GOCACHE"
        go build -o "$target" .
        chmod 755 "$target"
        echo "Installed CLI to $target"
